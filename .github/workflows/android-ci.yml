name: Android CI

on:
  push:
    branches: [ "main", "master", "fix/404-slug-validation" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew (if exists)
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug || gradle assembleDebug

    - name: Run Unit Tests
      run: ./gradlew test || gradle test

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ganjoorak-apk
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/**/*.apk
        retention-days: 30

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          app/build/reports/tests/
          **/build/test-results/
        retention-days: 7

  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Run Android Lint
      run: ./gradlew lint || gradle lint

    - name: Upload Lint Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: |
          app/build/reports/lint-results.html
          **/build/reports/lint/
        retention-days: 7
